server:
  port: 8081
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mytask?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: xxxxxx
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 5s

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.mytask.pojo
